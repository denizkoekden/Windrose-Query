name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Puts cl.exe / link.exe into PATH so xmake picks up MSVC without
      # relying on the runner's default VS detection.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\.xmake
            .xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-${{ runner.os }}-

      - name: Configure
        run: xmake f -y -m release -a x64 -p windows

      - name: Build
        run: xmake -y

      - name: Verify output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/version.dll")) {
            Write-Error "dist/version.dll missing after build"
            exit 1
          }
          Get-Item dist/version.dll | Format-List Name,Length,LastWriteTime

      - uses: actions/upload-artifact@v4
        with:
          name: version-dll-${{ github.sha }}
          path: dist/version.dll
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: version-dll-*
          merge-multiple: true
          path: dist

      - name: Stage release asset
        run: |
          mkdir -p out
          cp dist/version.dll "out/version-${GITHUB_REF_NAME}.dll"
          ls -l out

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*.dll
          generate_release_notes: true
          draft: false
          # Treat v0.x tags and any tag containing a pre-release suffix (e.g.
          # v1.0.0-beta, v2.0-rc1) as GitHub pre-releases. Stable 1.x+ tags
          # without a suffix go out as full releases.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') || contains(github.ref_name, '-') }}
